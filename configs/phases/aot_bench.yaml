# =============================================================================
# BENCH AOT — Comparaison stratégies compilation JAX
# ~36 groupes effectifs, durée cible 6-10 min total (3 stratégies)
# =============================================================================

phase: aot_bench
config_mode: default

max_iterations: [50, 200]
n_dof: [20, 50, 100]

axes:

  gamma:
    - id: GAM-001           # markovian, diff, kernel simple
      params:
        beta: [1.0, 5.0]

    - id: GAM-009           # stochastic → kernel différent de GAM-001
      params:
        beta: [1.0]
        sigma: [0.05]

    - id: GAM-015           # SVD truncation → kernel lourd, compile time élevé attendu
      params:
        k: [5]

  encoding:
    - id: SYM-002           # rank=2 → shape (n_dof, n_dof)

    - id: RN-001            # rank=3 → shape (n_dof, n_dof, n_dof) — groupe distinct
      params:
        rank: [3]

  modifier:
    - id: M0