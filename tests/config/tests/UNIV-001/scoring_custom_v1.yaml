# tests/config/tests/UNIV-001/scoring_custom_v1.yaml
# Override scoring spécifique UNIV-001

version: "1.0"
config_id: "UNIV-001_scoring_custom_v1"
description: "Scoring personnalisé UNIV-001 - focus explosions normes"
test_id: "UNIV-001"

# Override règles spécifiques (fusion avec global)
frobenius_norm:
  threshold_high: 800.0      # Override seuil
  critical_high: 8000.0
  weight: 3.0                # Plus critique que global

stat_std:
  pathology_type: "S1_COLLAPSE"
  threshold_low: 0.05        # Plus strict
  critical_low: 0.005

# Nouvelle règle (pas dans global)
evolution_volatility:
  source: "evolution.frobenius_norm.volatility"
  pathology_type: "S2_EXPLOSION"
  threshold_high: 1.0
  critical_high: 10.0
  weight: 1.5