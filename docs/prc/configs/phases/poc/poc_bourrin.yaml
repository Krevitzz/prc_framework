# =============================================================================
# TEMPLATE RUN PRC — VERSION BOURRIN
# Tout prérempli, tout actif — à tailler selon ce qu'on veut tester
# Produit cartésien total : ÉNORME — filtrer avant de lancer
# =============================================================================

phase: bourrin
config_mode: default

max_iterations: [10, 50, 100, 300, 500, 1000]
n_dof: [10, 20, 50, 100, 200, 500, 1000]

axes:

  # ---------------------------------------------------------------------------
  # GAMMAS
  # ---------------------------------------------------------------------------

  gamma:

    # -- Markovians -----------------------------------------------------------

    - id: GAM-001
      params:
        beta: [0.5, 1.0, 2.0, 5.0, 10.0]

    - id: GAM-002           # rang 2 uniquement
      params:
        alpha: [0.001, 0.01, 0.05, 0.1, 0.2]

    - id: GAM-003           # conçu pour exploser
      params:
        gamma: [0.01, 0.03, 0.05, 0.08, 0.1]

    - id: GAM-004
      params:
        gamma: [0.01, 0.03, 0.05, 0.08, 0.1]

    # -- Non-markovians -------------------------------------------------------

    - id: GAM-005
      params:
        omega: [0.3927, 0.7854, 1.5708, 2.3562, 3.1416]   # π/8 π/4 π/2 3π/4 π

    - id: GAM-006
      params:
        beta: [0.5, 1.0, 2.0, 5.0, 10.0]
        alpha: [0.1, 0.3, 0.5, 0.7, 1.0]

    - id: GAM-007           # rang 2 uniquement
      params:
        epsilon: [0.01, 0.05, 0.1, 0.3, 0.5]

    - id: GAM-008
      params:
        gamma: [0.1, 0.3, 0.5, 0.7, 1.0]
        beta: [0.5, 1.0, 2.0, 5.0, 10.0]

    # -- Stochastiques --------------------------------------------------------

    - id: GAM-009
      params:
        beta: [0.5, 1.0, 2.0, 5.0, 10.0]
        sigma: [0.001, 0.01, 0.05, 0.1, 0.3]
        seed_run: [null, 0, 1, 2, 42]

    - id: GAM-010
      params:
        sigma: [0.001, 0.01, 0.05, 0.1, 0.3]
        seed_run: [null, 0, 1, 2, 42]

    # -- Structuraux ----------------------------------------------------------

    - id: GAM-012           # rang 2 uniquement
      params:
        beta: [0.5, 1.0, 2.0, 5.0, 10.0]

    - id: GAM-013           # matrice carrée uniquement
      params:
        eta: [0.001, 0.005, 0.01, 0.05, 0.1]


  # ---------------------------------------------------------------------------
  # ENCODINGS
  # ---------------------------------------------------------------------------

  encoding:

    # -- Symétrique -----------------------------------------------------------

    - id: SYM-001           # déterministe, pas de seed_CI

    - id: SYM-002
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: SYM-003
      params:
        sigma: [0.1, 0.2, 0.3, 0.5, 1.0]
        seed_CI: [null, 0, 1, 2, 42]

    - id: SYM-004
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: SYM-005
      params:
        bandwidth: [1, 2, 3, 5, 10]
        amplitude: [0.1, 0.3, 0.5, 0.7, 1.0]
        seed_CI: [null, 0, 1, 2, 42]

    - id: SYM-006
      params:
        n_blocks: [3, 5, 10, 20, 50]
        intra_corr: [0.3, 0.5, 0.7, 0.9, 0.99]
        inter_corr: [0.0, 0.05, 0.1, 0.2, 0.3]
        seed_CI: [null, 0, 1, 2, 42]

    - id: SYM-007           # déterministe, pas de seed_CI
      params:
        correlation: [0.1, 0.3, 0.5, 0.7, 0.9]

    - id: SYM-008
      params:
        mean: [-0.5, -0.1, 0.0, 0.1, 0.5]
        std: [0.1, 0.2, 0.3, 0.5, 1.0]
        seed_CI: [null, 0, 1, 2, 42]

    # -- Asymétrique ----------------------------------------------------------

    - id: ASY-001
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: ASY-002
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: ASY-003
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: ASY-004
      params:
        gradient: [0.05, 0.1, 0.3, 0.5, 1.0]
        noise_amplitude: [0.05, 0.1, 0.2, 0.5, 1.0]
        seed_CI: [null, 0, 1, 2, 42]

    - id: ASY-005
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: ASY-006
      params:
        density: [0.05, 0.1, 0.2, 0.4, 0.8]
        seed_CI: [null, 0, 1, 2, 42]

    # -- Rang 3 — incompatible GAM-002, GAM-007, GAM-012 (skipé auto) ---------

    - id: R3-001
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-002
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-003
      params:
        radius: [1, 2, 3, 5, 8]
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-004
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-005
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-006
      params:
        seed_CI: [null, 0, 1, 2, 42]

    - id: R3-007
      params:
        n_blocks: [2, 4, 8, 16, 32]
        seed_CI: [null, 0, 1, 2, 42]


  # ---------------------------------------------------------------------------
  # MODIFIERS
  # ---------------------------------------------------------------------------

  modifier:

    - id: M0

    - id: M1
      params:
        sigma: [0.005, 0.01, 0.05, 0.1, 0.3]

    - id: M2
      params:
        amplitude: [0.01, 0.05, 0.1, 0.2, 0.5]