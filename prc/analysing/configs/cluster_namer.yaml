# cluster_namer.yaml
# Configuration du registre de nommage cluster
# Intégration : analysing/configs/cluster_namer.yaml

namer:

  # ── Confiance terme ──────────────────────────────────────────────────────────

  normalization:
    method: percentile        # percentile | zscore
    reference: layer_local    # layer_local | global (anticipation multi-layer)

  conf_min_name:     0.65     # En dessous → slot va dans slots_secondary
  conf_min_display:  0.50     # En dessous → slot affiché entre parenthèses dans rapport
  name_separator:    "·"      # Séparateur entre termes dans le nom composé

  # ── Ordre des slots dans le nom composé ─────────────────────────────────────
  # Slots absents ou non calibrés → points de suspension dans le nom
  slot_order:
    - AMPLITUDE       # norm_ratio — axe principal, toujours en premier
    - SANTÉ_NUM       # pathologies — avant tout le reste si présentes
    - VITESSE         # temporalité début (catch22) — calibration poc4
    - TEXTURE         # texture résiduelle (catch22) — calibration poc4
    - ENTROPIE        # entropy_delta — disponible maintenant
    - RANG            # effective_rank_delta — disponible maintenant

  # ── Définition des slots ────────────────────────────────────────────────────

  slots:

    AMPLITUDE:
      calibrated: true
      feature_primary: norm_ratio_median
      feature_secondary: norm_ratio_iqr     # IQR large → hétérogénéité amplitude
      direction: bidirectional              # décision dépend de la zone, pas d'un sens unique
      terms:
        EXPLOSION:
          condition: "eu_finite_ratio_min < 1.0 and norm_ratio_is_nan"
          percentile_direction: null        # règle booléenne, pas percentile
        COLLAPSE:
          condition: "norm_ratio_median < threshold"
          threshold: 0.10
          percentile_direction: lower       # plus bas = plus sûr
        CONSERVE:
          condition: "0.10 <= norm_ratio_median < threshold"
          threshold: 1.30
          percentile_direction: null        # zone médiane → conf basée IQR
        CROISSANCE_FAIBLE:
          condition: "1.30 <= norm_ratio_median < threshold"
          threshold: 3.0
          percentile_direction: upper
        CROISSANCE_FORTE:
          condition: "3.0 <= norm_ratio_median < threshold"
          threshold: 10.0
          percentile_direction: upper
        SATURATION:
          condition: "norm_ratio_median >= threshold or sentinel"
          threshold: 10.0
          sentinel: 148.413                 # log1p(e^5) — plafond pipeline
          percentile_direction: upper

    SANTÉ_NUM:
      calibrated: true
      feature_primary: has_nan_frac
      feature_secondary: condition_num_median
      direction: upper                      # plus haut = plus pathologique
      terms:
        INSTABLE:
          condition: "has_nan_frac > threshold"
          threshold: 0.30                   # >30% des runs avec NaN
          percentile_direction: upper
        CONDITIONNÉ:
          condition: "condition_num_median > threshold"
          threshold: 1.0e6
          percentile_direction: upper
      # Si aucun terme → slot omis du nom (cluster sain, info nulle)
      omit_if_clean: true

    VITESSE:
      calibrated: false                     # Seuils à calibrer sur poc3/poc4
      feature_primary: CO_FirstMin_ac_median
      feature_secondary: IN_AutoMutualInfoStats_40_gaussian_fmmi_median
      direction: lower                      # lag court = signal vite décorrélé = dynamique rapide
      terms:
        ABRUPT:
          condition: "CO_FirstMin_ac_median < threshold"
          threshold: null                   # À calibrer
          percentile_direction: lower
        PROGRESSIF:
          condition: "threshold_low <= CO_FirstMin_ac_median < threshold_high"
          threshold_low: null
          threshold_high: null
          percentile_direction: null
        LENT:
          condition: "CO_FirstMin_ac_median >= threshold"
          threshold: null
          percentile_direction: upper

    TEXTURE:
      calibrated: false                     # Seuils à calibrer sur poc3/poc4
      feature_primary: SB_MotifThree_quantile_hh_median
      feature_secondary: SB_TransitionMatrix_3ac_sumdiagcov_median
      direction: upper                      # plus haut = plus de motifs = plus de texture
      terms:
        OSCILLANT:
          condition: "SB_MotifThree_quantile_hh_median > threshold"
          threshold: null
          percentile_direction: upper
        CONSTANT:
          condition: "SB_MotifThree_quantile_hh_median < threshold"
          threshold: null
          percentile_direction: lower
        BRUITÉ:
          condition: "SB_TransitionMatrix_3ac_sumdiagcov_median > threshold"
          threshold: null
          percentile_direction: upper

    ENTROPIE:
      calibrated: true
      feature_primary: entropy_delta_median
      feature_secondary: entropy_delta_iqr
      direction: bidirectional
      terms:
        ENTROPIE_CROISSANTE:
          condition: "entropy_delta_median > threshold"
          threshold: 0.05
          percentile_direction: upper
        ENTROPIE_DÉCROISSANTE:
          condition: "entropy_delta_median < threshold"
          threshold: -0.05
          percentile_direction: lower
      # Si entropy_delta proche de 0 → slot omis (stable, non discriminant)
      omit_if_neutral: true
      neutral_threshold: 0.05

    RANG:
      calibrated: true
      feature_primary: effective_rank_delta_median
      feature_secondary: effective_rank_delta_iqr
      direction: bidirectional
      terms:
        RANG_EFFONDRÉ:
          condition: "effective_rank_delta_median < threshold"
          threshold: -5.0
          percentile_direction: lower
        RANG_CROISSANT:
          condition: "effective_rank_delta_median > threshold"
          threshold: 5.0
          percentile_direction: upper
      omit_if_neutral: true
      neutral_threshold: 5.0
