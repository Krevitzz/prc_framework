# tests/config/global/scoring_strict_v1.yaml
version: "1.0"
config_id: "scoring_strict_v1"
description: "Scoring strict - seuils exigeants"
created_date: "2025-01-04"

default_aggregation_mode: "max"

tests:
  UNI-001:
    test_weight: 2.0
    aggregation_mode: "max"
    
    scoring_rules:
      frobenius_norm:
        source: "statistics.frobenius_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 500.0       # ÷2 vs pathologies_v1
        critical_high: 5000.0       # ÷2
        weight: 2.0
        mode: "soft"

  SYM-001:
    test_weight: 1.5
    aggregation_mode: "max"
    
    scoring_rules:
      asymmetry_norm:
        source: "statistics.asymmetry_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 0.01        # ÷10 vs pathologies_v1
        critical_high: 0.1          # ÷10
        weight: 3.0
        mode: "soft"
      
      asymmetry_norm_normalized:
        source: "statistics.asymmetry_norm_normalized.final"
        pathology_type: "S3_PLATEAU"
        interval_toxic: [0.7, 1.0]  # vs [0.8, 1.0]
        weight: 2.0
        mode: "soft"