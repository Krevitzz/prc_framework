# tests/config/global/scoring_pathologies_v1.yaml
# Scoring pathologies Charter 5.4

version: "1.0"
config_id: "scoring_pathologies_v1"
description: "Scoring pathologies R0 - détection anomalies structurelles"
created_date: "2025-01-03"
charter_reference: "Section 12.8"

# =============================================================================
# AGRÉGATION GLOBALE
# =============================================================================

default_aggregation_mode: "max"  # Une pathologie suffit (R0)

# =============================================================================
# TESTS - UNIV (UNIVERSELS)
# =============================================================================

tests:
  UNIV-001:
    test_weight: 2.0
    aggregation_mode: "max"
    
    scoring_rules:
      # Explosion norme Frobenius
      frobenius_norm:
        source: "statistics.frobenius_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 1000.0
        critical_high: 10000.0
        weight: 2.0
        mode: "soft"
      
      # Collapse variance
      stat_std:
        source: "statistics.frobenius_norm.std"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.1
        critical_low: 0.01
        weight: 1.5
        mode: "soft"
      
      # Transition explosive
      evolution_transition:
        source: "evolution.frobenius_norm.transition"
        pathology_type: "MAPPING"
        mapping:
          explosive: 1.0
          divergent: 1.0
          stable: 0.0
          converged: 0.0
          growing: 0.3
          shrinking: 0.3
          oscillating: 0.4
        weight: 3.0
      
      # Tendance instable
      evolution_trend:
        source: "evolution.frobenius_norm.trend"
        pathology_type: "MAPPING"
        mapping:
          stable: 0.0
          increasing: 0.5
          decreasing: 0.3
          unknown: 0.5
        weight: 1.0

  UNIV-002:
    test_weight: 1.5
    aggregation_mode: "max"
    
    scoring_rules:
      # Trace explosive
      trace_absolute:
        source: "statistics.trace_absolute.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 1000.0
        critical_high: 10000.0
        weight: 2.0
        mode: "soft"
      
      # Trace normalisée collapse
      trace_normalized:
        source: "statistics.trace_normalized.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.01
        critical_low: 0.001
        weight: 1.5
        mode: "soft"

# =============================================================================
# TESTS - SYM (SYMÉTRIE)
# =============================================================================

  SYM-001:
    test_weight: 1.5
    aggregation_mode: "max"
    
    scoring_rules:
      # Création asymétrie indésirée
      asymmetry_norm:
        source: "statistics.asymmetry_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 0.1
        critical_high: 1.0
        weight: 3.0
        mode: "soft"
      
      # Asymétrie relative trop élevée
      asymmetry_norm_normalized:
        source: "statistics.asymmetry_norm_normalized.final"
        pathology_type: "S3_PLATEAU"
        interval_toxic: [0.8, 1.0]  # Trop asymétrique
        weight: 2.0
        mode: "soft"

# =============================================================================
# TESTS - SPE (SPECTRAL)
# =============================================================================

  SPE-001:
    test_weight: 1.5
    aggregation_mode: "max"
    
    scoring_rules:
      # Valeur propre max explosive
      eigenvalue_max:
        source: "statistics.eigenvalue_max.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 1000.0
        critical_high: 10000.0
        weight: 2.0
        mode: "soft"
      
      # Gap spectral collapse
      spectral_gap:
        source: "statistics.spectral_gap.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.01
        critical_low: 0.001
        weight: 1.5
        mode: "soft"
      
      # Rayon spectral > 1 (divergence itérative)
      spectral_radius:
        source: "statistics.spectral_radius.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 1.0
        critical_high: 10.0
        weight: 3.0
        mode: "soft"

# =============================================================================
# TESTS - PAT (PATTERNS)
# =============================================================================

  PAT-001:
    test_weight: 1.0
    aggregation_mode: "max"
    
    scoring_rules:
      # Perte diversité (collapse informationnel)
      diversity_simpson:
        source: "statistics.diversity_simpson.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.1
        critical_low: 0.01
        weight: 2.0
        mode: "soft"
      
      # Concentration excessive (structure collapse)
      concentration_top10:
        source: "statistics.concentration_top10.final"
        pathology_type: "S3_PLATEAU"
        interval_toxic: [0.9, 1.0]  # Trop concentré
        weight: 1.5
        mode: "soft"
      
      # Uniformité excessive (perte structure)
      uniformity:
        source: "statistics.uniformity.final"
        pathology_type: "S3_PLATEAU"
        interval_toxic: [0.95, 1.0]
        weight: 1.0
        mode: "soft"

# =============================================================================
# TESTS - SPA (SPATIAL)
# =============================================================================

  SPA-001:
    test_weight: 1.0
    aggregation_mode: "max"
    
    scoring_rules:
      # Gradient magnitude explosif
      gradient_magnitude:
        source: "statistics.gradient_magnitude.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 10.0
        critical_high: 100.0
        weight: 2.0
        mode: "soft"
      
      # Laplacien energy explosif (rugosité excessive)
      laplacian_energy:
        source: "statistics.laplacian_energy.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 1.0
        critical_high: 10.0
        weight: 1.5
        mode: "soft"
      
      # Smoothness collapse (structure trop rugueuse)
      smoothness:
        source: "statistics.smoothness.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.1
        critical_low: 0.01
        weight: 1.0
        mode: "soft"

# =============================================================================
# TESTS - TOP (TOPOLOGIQUE)
# =============================================================================

  TOP-001:
    test_weight: 0.8
    aggregation_mode: "max"
    
    scoring_rules:
      # Fragmentation excessive (trop de composantes)
      connected_components:
        source: "statistics.connected_components.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 100.0
        critical_high: 1000.0
        weight: 1.5
        mode: "soft"
      
      # Trous excessifs
      holes_count:
        source: "statistics.holes_count.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 50.0
        critical_high: 500.0
        weight: 1.0
        mode: "soft"
      
      # Euler characteristic anormal
      euler_characteristic:
        source: "statistics.euler_characteristic.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 100.0
        critical_high: 1000.0
        weight: 0.8
        mode: "soft"

# =============================================================================
# TESTS - GRA (GRAPHE)
# =============================================================================

  GRA-001:
    test_weight: 1.0
    aggregation_mode: "max"
    
    scoring_rules:
      # Densité collapse (graphe vide)
      density:
        source: "statistics.density.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.01
        critical_low: 0.001
        weight: 1.5
        mode: "soft"
      
      # Clustering collapse (pas de structure)
      clustering_local:
        source: "statistics.clustering_local.final"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.05
        critical_low: 0.01
        weight: 1.0
        mode: "soft"
      
      # Variance degrés excessive (structure déséquilibrée)
      degree_variance:
        source: "statistics.degree_variance.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 10.0
        critical_high: 100.0
        weight: 1.2
        mode: "soft"

# =============================================================================
# NOTES D'USAGE
# =============================================================================

# 1. SEUILS INITIAUX
#    Tous les seuils sont des BASELINES exploratoires
#    Ajuster selon patterns détectés (non_discriminant, over_discriminant)

# 2. WEIGHTS
#    Reflètent criticité attendue pour mécanisme
#    Weight élevé = métrique discriminante attendue
#    Weight faible = métrique exploratoire

# 3. MODE SOFT vs HARD
#    soft (default): Interpolation linéaire entre threshold et critical
#    hard: Binaire (0 ou 1)
#    Préférer soft pour R0 (plus de nuances)

# 4. AGGREGATION_MODE
#    max (default R0): Une pathologie suffit
#    weighted_mean: Moyenne pondérée (R1+)
#    weighted_max: Max pondéré par weights relatifs

# 5. SOURCE PATHS
#    Format: section.metric_name.field
#    - statistics.{metric}.final (valeur finale)
#    - statistics.{metric}.mean (moyenne temporelle)
#    - evolution.{metric}.transition (transition qualitative)
#    - evolution.{metric}.trend (tendance)

# 6. CRÉATION NOUVEAUX TESTS
#    Template minimal:
#    
#    TEST-XXX:
#      test_weight: 1.0
#      aggregation_mode: "max"
#      scoring_rules:
#        metric_name:
#          source: "statistics.metric_name.final"
#          pathology_type: "S2_EXPLOSION"
#          threshold_high: 1000.0
#          weight: 2.0

# 7. OVERRIDES SPÉCIFIQUES
#    Créer tests/config/tests/TEST-ID/scoring_custom_v1.yaml
#    Exemple:
#    
#    version: "1.0"
#    config_id: "TEST-001_scoring_custom_v1"
#    
#    # Override seuils
#    frobenius_norm:
#      threshold_high: 500.0  # Plus strict
#      critical_high: 5000.0