# configs/thresholds/laxe/regimes.yaml
# Seuils régimes — profil LAXE (tolérant, exploration)

CONSERVES_NORM:
  ratio_threshold: 1.5      # norm_final / norm_initial < 1.5 (tolérant)
  cv_threshold: 0.15        # CV cross-runs < 15%

NUMERIC_INSTABILITY:
  condition_threshold: 5.0e6    # condition_number > 5e6 (moins sensible)
  norm_threshold: 1.0e12        # norm_final > 1e12

EFFONDREMENT:
  ratio_threshold: 0.05     # norm_final / norm_initial < 0.05 (strict effondrement)

SATURATION:
  ratio_threshold: 15       # norm_final / norm_initial > 15
  condition_threshold: 1.0e4    # condition_number < 1e4

ASYMMETRY_BREAKING:
  asymmetry_ratio_threshold: 0.6    # asymmetry_norm / norm > 0.6

TRIVIAL:
  cv_threshold: 0.005       # CV cross-runs < 0.5%
