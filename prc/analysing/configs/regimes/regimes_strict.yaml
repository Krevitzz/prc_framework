# configs/thresholds/strict/regimes.yaml
# Seuils régimes — profil STRICT (conservateur, production)

CONSERVES_NORM:
  ratio_threshold: 1.1      # norm_final / norm_initial < 1.1 (strict)
  cv_threshold: 0.05        # CV cross-runs < 5%

NUMERIC_INSTABILITY:
  condition_threshold: 1.0e5    # condition_number > 1e5 (très sensible)
  norm_threshold: 1.0e8         # norm_final > 1e8

EFFONDREMENT:
  ratio_threshold: 0.2      # norm_final / norm_initial < 0.2

SATURATION:
  ratio_threshold: 5        # norm_final / norm_initial > 5
  condition_threshold: 500      # condition_number < 500

ASYMMETRY_BREAKING:
  asymmetry_ratio_threshold: 0.3    # asymmetry_norm / norm > 0.3

TRIVIAL:
  cv_threshold: 0.02        # CV cross-runs < 2%
