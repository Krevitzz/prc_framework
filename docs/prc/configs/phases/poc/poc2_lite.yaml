# =============================================================================
# TEMPLATE RUN PRC — toutes options documentées
# Copier-coller, décommenter ce qu'on veut, supprimer le reste
# =============================================================================

phase: ma_phase          # nom du fichier parquet en sortie
config_mode: default     # default | strict | laxe

# --- Axes globaux ------------------------------------------------------------
# Scalaire = même valeur pour tous les runs
# Liste    = un axe d'itération (produit cartésien avec le reste)

max_iterations: 100               # ou [10, 50, 100, 300, 1000]
n_dof: 10                         # ou [10, 20, 50, 100]


# =============================================================================
# AXES ATOMICS
# =============================================================================
#
# Syntaxe generale :
#   gamma: all                          → tous les gammas, défauts YAML
#   gamma:
#     - id: GAM-001                     → défauts YAML, 1 composition
#     - id: GAM-001
#       params:
#         beta: [0.5, 1.0, 2.0]        → produit cartésien, N compositions
#
# Règle : params liste → explose en N entrées
#         params scalaire → 1 entrée (surcharge le défaut YAML)
#         pas de params → défaut YAML s'applique
#
# =============================================================================

axes:

  # ---------------------------------------------------------------------------
  # GAMMAS
  # ---------------------------------------------------------------------------
  #
  # ⚠ GAM-002, GAM-007, GAM-012 : rang 2 uniquement (ValueError si R3)
  # ⚠ GAM-013                   : matrice carrée uniquement
  # ⚠ GAM-003                   : conçu pour exploser (test robustesse)
  #
  gamma:

    # -- Markovians -----------------------------------------------------------

    - id: GAM-001           # tanh(β·T)
      # params:
      #   beta: 2.0         # ou [0.5, 1.0, 2.0, 5.0]

    - id: GAM-002           # Diffusion Laplacienne — rang 2 uniquement
      # params:
      #   alpha: 0.05       # ou [0.01, 0.05, 0.1]

    - id: GAM-003           # T·exp(γ) — conçu pour exploser
      # params:
      #   gamma: 0.05

    - id: GAM-004           # T·exp(-γ) — décroissance exponentielle
      # params:
      #   gamma: 0.05

    # -- Non-markovians -------------------------------------------------------

    - id: GAM-005           # Oscillateur harmonique
      # params:
      #   omega: 0.7853981633974483   # π/4

    - id: GAM-006           # tanh(β·T + α·ΔT)
      # params:
      #   beta: 1.0
      #   alpha: 0.3

    - id: GAM-007           # Moyenne glissante 8-voisins — rang 2 uniquement
      # params:
      #   epsilon: 0.1

    - id: GAM-008           # Mémoire différentielle
      # params:
      #   gamma: 0.3
      #   beta: 1.0

    # -- Stochastiques --------------------------------------------------------
    # seed_run : null = non-seeded (différent à chaque run)
    #            entier = reproductible
    #            liste  = un axe d'itération

    - id: GAM-009           # tanh(β·T) + σ·ε
      # params:
      #   beta: 1.0
      #   sigma: 0.01       # ou [0.001, 0.01, 0.05]
      #   seed_run: 42      # ou [null, 0, 1, 2, 42]

    - id: GAM-010           # tanh(T·(1+σ·ε)) bruit multiplicatif
      # params:
      #   sigma: 0.05       # ou [0.01, 0.05, 0.1]
      #   seed_run: 42      # ou [null, 0, 1, 2, 42]

    # -- Structuraux ----------------------------------------------------------

    - id: GAM-012           # Symétrie forcée — rang 2 uniquement
      # params:
      #   beta: 2.0

    - id: GAM-013           # Hebbien T + η·T@T — matrice carrée uniquement
      # params:
      #   eta: 0.01


  # ---------------------------------------------------------------------------
  # ENCODINGS
  # ---------------------------------------------------------------------------
  #
  # seed_CI : null = non-seeded | entier = reproductible | liste = axe
  # SYM-001, SYM-007 : déterministes, pas de seed_CI
  # R3-* : incompatibles avec GAM-002, GAM-007, GAM-012 (rang 2 only)
  #
  encoding:

    # -- Symétrique (rang 2) --------------------------------------------------

    - id: SYM-001           # Identité — déterministe, pas de seed_CI

    - id: SYM-002           # Uniforme symétrique (B+Bᵀ)/2
      # params:
      #   seed_CI: 42       # ou [null, 0, 1, 2, 42]

    - id: SYM-003           # Gaussienne symétrique
      # params:
      #   sigma: 0.3
      #   seed_CI: 42

    - id: SYM-004           # Matrice de corrélation C·Cᵀ
      # params:
      #   seed_CI: 42

    - id: SYM-005           # Bande sparse
      # params:
      #   bandwidth: 3
      #   amplitude: 0.5
      #   seed_CI: 42

    - id: SYM-006           # Blocs hiérarchiques
      # params:
      #   n_blocks: 10
      #   intra_corr: 0.7
      #   inter_corr: 0.1
      #   seed_CI: 42

    - id: SYM-007           # Corrélation uniforme — déterministe, pas de seed_CI
      # params:
      #   correlation: 0.5

    - id: SYM-008           # Gaussienne clippée [-1,1]
      # params:
      #   mean: 0.0
      #   std: 0.3
      #   seed_CI: 42

    # -- Asymétrique (rang 2) -------------------------------------------------

    - id: ASY-001           # Uniforme asymétrique U[-1,1]
      # params:
      #   seed_CI: 42

    - id: ASY-002           # Triangulaire inférieure
      # params:
      #   seed_CI: 42

    - id: ASY-003           # Antisymétrique A = -Aᵀ
      # params:
      #   seed_CI: 42

    - id: ASY-004           # Gradient directionnel
      # params:
      #   gradient: 0.1
      #   noise_amplitude: 0.2
      #   seed_CI: 42

    - id: ASY-005           # Circulant décalé
      # params:
      #   seed_CI: 42

    - id: ASY-006           # Sparse asymétrique
      # params:
      #   density: 0.2
      #   seed_CI: 42

    # -- Rang 3 ---------------------------------------------------------------
    # ⚠ Incompatible avec GAM-002, GAM-007, GAM-012 (ValueError → skipé)

    - id: R3-001            # Uniforme T_ijk ~ U[-1,1]
      # params:
      #   seed_CI: 42

    - id: R3-002            # Partiellement symétrique T_ijk = T_ikj
      # params:
      #   seed_CI: 42

    - id: R3-003            # Couplage local sparse
      # params:
      #   radius: 2
      #   seed_CI: 42

    - id: R3-004            # Symétrie totale (6 permutations)
      # params:
      #   seed_CI: 42

    - id: R3-005            # Diagonal T_ijk ≠ 0 ssi i=j=k
      # params:
      #   seed_CI: 42

    - id: R3-006            # Séparable u_i·v_j·w_k
      # params:
      #   seed_CI: 42

    - id: R3-007            # Blocs 3D
      # params:
      #   n_blocks: 4
      #   seed_CI: 42


  # ---------------------------------------------------------------------------
  # MODIFIERS
  # ---------------------------------------------------------------------------

  modifier:

    - id: M0                # Identité — pas de params

    - id: M1                # Bruit gaussien additif
      # params:
      #   sigma: 0.05       # ou [0.01, 0.05, 0.1]

    - id: M2                # Bruit uniforme additif
      # params:
      #   amplitude: 0.1    # ou [0.05, 0.1, 0.2]