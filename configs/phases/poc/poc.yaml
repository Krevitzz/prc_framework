# =============================================================================
# PRC v7 — poc_v7.yaml
# Premier run squelette : GAM-011 × SYM-001 × M0
# 4 groupes XLA, 12 runs, 1 parquet
# =============================================================================

phase: poc_v7

# --- Axes globaux ------------------------------------------------------------
n_dof          : [10, 50]
max_iterations : [50, 200]

# --- Seeds -------------------------------------------------------------------
# seed_CI  : initialisation de D (encoding)
# seed_run : aléatoire dans le scan (gammas stochastiques)
# liste    → axe d'itération
seed_CI  : [0, 1, 2]
seed_run : null          # déterministe — GAM-011 ignore la key

# =============================================================================
# AXES ATOMICS
# =============================================================================

axes:

  gamma:
    - id: GAM-011          # Transformation linéaire tensordot — rang-agnostique
      params:
        scale: 1.0         # rayon spectral W = 1.0

  encoding:
    - id: SYM-001          # Identité — point zéro F1/F2, déterministe

  modifier:
    - id: M0               # Identité — placeholder structurel
