# analysing/configs/regimes/default.yaml
# Seuils régimes — profil DEFAULT enrichi (CROISSANCE ajoutée)

CONSERVES_NORM:
  ratio_threshold: 1.3      # norm_final / norm_initial < 1.3
  cv_threshold: 0.10        # CV cross-runs < 10%

CROISSANCE_FAIBLE:
  ratio_min: 1.3           # 1.3 < ratio < 3.0
  ratio_max: 3.0
  cv_threshold: 0.20        # Variabilité modérée acceptable

CROISSANCE_FORTE:
  ratio_min: 3.0           # 3.0 < ratio < 10
  ratio_max: 10.0
  cv_threshold: 0.30        # Croissance rapide, plus variable

NUMERIC_INSTABILITY:
  condition_threshold: 1.0e6
  norm_threshold: 1.0e10

EFFONDREMENT:
  ratio_threshold: 0.1

SATURATION:
  ratio_threshold: 10       # norm_final / norm_initial > 10
  condition_threshold: 1.0e3

ASYMMETRY_BREAKING:
  asymmetry_ratio_threshold: 0.5

TRIVIAL:
  cv_threshold: 0.01
