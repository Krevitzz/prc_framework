# =============================================================================
# poc_cache_bench.yaml
#
# Objectif : mesurer le ratio compilation/calcul via 2 runs successifs.
#
# Stratégie :
#   - Peu de combinaisons (run court) mais groupes XLA variés
#   - n_dof petit (calcul rapide) — on veut mesurer le temps de compilation
#   - 3 familles gamma (markovian, stochastic, structural) × 3 encodings
#     × 2 modifiers × 2 n_dof × 2 max_it = 72 groupes XLA distincts
#   - ~288 runs total (léger)
#
# Lecture résultats :
#   Run 1 (cache froid) : T1
#   Run 2 (cache chaud) : T2
#   Coût compilation    : T1 - T2
#   Ratio               : T1 / T2
# =============================================================================

phase: cache_bench
config_mode: default
dmd_rank: 16    # Rang DMD streaming — statique XLA (wiper jax_cache/ si modifié)

n_dof: [10, 20]
max_iterations: [5, 20]

seed_CI:  [0, 1]
seed_run: [null, 0]

axes:

  gamma:
    - id: GAM-001          # markovian simple
      params:
        beta: [1.0, 3.0]

    - id: GAM-009          # stochastique
      params:
        beta: [1.0]
        sigma: [0.01, 0.1]

    - id: GAM-013          # structural square
      params:
        eta: [0.01, 0.05]

  encoding:
    - id: SYM-001          # rank=2 déterministe
    - id: SYM-002          # rank=2 stochastique
    - id: RN-001           # rank paramétrique
      params:
        rank: [2, 3]

  modifier:
    - id: M0
    - id: M1
      params:
        sigma: [0.05]
