  score_max: 0.50       # vs 0.40 default
  robustness_min: 0.50  # vs 0.60 default
  majority_min: 0.40    # vs 0.50 default

# Seuils REJECTED (plus difficile à atteindre)
rejected:
  score_min: 0.50       # vs 0.60 default
  robustness_max: 0.50  # vs 0.40 default (paradoxe : plus haut = plus tolérant)
  majority_max: 0.25    # vs 0.20 default