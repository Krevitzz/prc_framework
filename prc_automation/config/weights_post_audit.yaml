# config/weights_post_audit.yaml
# Pondérations révisées post-audit UNIV-002 (2025-12-28)

version: "1.1"
config_id: "weights_post_audit"
description: "Pondérations révisées intégrant nouveaux tests diversité"
created_date: "2025-12-28"
based_on: "weights_default v1.0"
audit_reference: "Audit UNIV-002 (2025-12-28)"

# =============================================================================
# CHANGEMENTS vs weights_default
# =============================================================================
#
# 1. UNIV-002 : Requalifié comme test de collapse global
#    - Poids maintenu à 2.0 (reste critique)
#    - Mais interprétation changée dans scoring
#
# 2. UNIV-002b : Nouveau test diversité locale
#    - Poids 2.5 (plus important que global)
#    - Complémentaire à UNIV-002
#
# 3. DIV-HETERO : Nouveau test hétérogénéité spatiale
#    - Poids 1.5 (structurel secondaire)
#
# 4. Tests invariants R0 : Poids réduits
#    - STR-002, DIV-ENTROPY, DIV-UNIFORM : 0.5
#
# =============================================================================

weights:
  # ===== TESTS UNIVERSELS (CRITIQUE) =====
  
  # Évolution norme (inchangé)
  UNIV-001: 2.0
  
  # Diversité GLOBALE (requalifié)
  UNIV-002: 2.0
  # Interprétation révisée : collapse variance globale, PAS diversité structurelle
  # Voir : score_diversity_revised() dans scoring.py
  
  # Diversité LOCALE (NOUVEAU - PRIORITAIRE)
  UNIV-002b: 2.5
  # Test complémentaire à UNIV-002
  # Mesure maintien structure locale indépendamment variance globale
  # Poids supérieur car plus proche de "diversité structurelle" attendue
  
  # Convergence (inchangé)
  UNIV-003: 2.0
  
  # Sensibilité CI (inchangé)
  UNIV-004: 2.0
  
  # ===== TESTS SYMÉTRIE (IMPORTANT) =====
  
  SYM-001: 1.5
  SYM-002: 1.5
  SYM-003: 1.0
  
  # ===== TESTS STRUCTURE (IMPORTANT) =====
  
  STR-001: 1.5
  
  # STR-002 : RÉDUIT (invariant R0 détecté)
  STR-002: 0.5  # était 1.5
  # Justification : variance=0 dans analyse patterns
  # Non-discriminant à R0, potentiellement utile à R1
  
  STR-003: 1.0
  
  # ===== TESTS BORNES (STANDARD) =====
  
  BND-001: 1.5  # Augmenté (très discriminant selon audit)
  BND-002: 1.0
  
  # ===== TESTS LOCALITÉ (STANDARD) =====
  
  LOC-001: 1.0
  LOC-002: 1.0
  
  # ===== TESTS DIVERSITÉ COMPLÉMENTAIRES =====
  
  # DIV-ENTROPY : RÉDUIT (invariant R0)
  DIV-ENTROPY: 0.5  # était 1.0
  
  # DIV-UNIFORM : RÉDUIT (invariant R0)
  DIV-UNIFORM: 0.5  # était 1.0
  
  # DIV-HETERO : NOUVEAU (hétérogénéité spatiale)
  DIV-HETERO: 1.5
  # Mesure variance de la variance locale (méta-diversité)
  # Distingue homogénéisation vs structuration modulaire
  
  # ===== TESTS CONVERGENCE COMPLÉMENTAIRES =====
  
  CONV-LYAPUNOV: 1.0

# =============================================================================
# NOTES D'UTILISATION
# =============================================================================
#
# Pour relancer analyse avec cette config :
#
#   python batch_runner.py --test --gamma GAM-001..013 \
#       --config weights_post_audit
#
#   python batch_runner.py --verdict --gamma GAM-001..013 \
#       --config weights_post_audit \
#       --thresholds thresholds_default
#
# Comparaison avec weights_default :
#   - Score global sera différent (nouveaux tests, poids révisés)
#   - Verdicts peuvent changer (surtout si UNIV-002b haut)
#   - Robustesse peut augmenter (tests locaux moins sévères)
#
# =============================================================================