# bourrin_v1.yaml — Couverture totale des atomics (gammas 15, encodings 20, modifiers 3)
# max_it 200, n_dof 50/100/200/500, seed_CI 0-3, seed_run 0-3
# 3 variantes de paramètres par atomic (ou plus) pour stresser le pipeline.

phase: gam-001
dmd_rank: 8

# ---------------------------------------------------------------------------
# Axes structurels
# ---------------------------------------------------------------------------
n_dof: [10, 20, 50, 100, 200]
max_it: [1000]
seed_CI: [0, 1, 2, 3, 11, 42, 101, 251]
seed_run: [0, 1, 2, 3, 11, 42, 101, 251]

# ---------------------------------------------------------------------------
# GAMMAS (15) – avec 3 variantes par paramètre principal
# ---------------------------------------------------------------------------
gamma:

  # Markovian differentiable
  - id: GAM-001
    params:
      beta: [1.0, 3.0, 5.0, 8.0, 13.0]

# ---------------------------------------------------------------------------
# ENCODINGS (20) – couverture complète
# ---------------------------------------------------------------------------
encoding:

  # SYM (8)
  - id: SYM-001
    params: {}
  - id: SYM-002
    params: {}
  - id: SYM-003
    params:
      sigma: [0.3, 0.5, 0.7]
  - id: SYM-004
    params: {}
  - id: SYM-005
    params:
      bandwidth: [2, 4, 6]
      amplitude: [0.3, 0.5, 0.7]
  - id: SYM-006
    params:
      n_blocks: [4, 6, 8]
      intra: [0.5, 0.7, 0.9]
      inter: [0.05, 0.1, 0.15]
  - id: SYM-007
    params:
      correlation: [0.3, 0.5, 0.7]
  - id: SYM-008
    params:
      mean: [0.0, 0.1, 0.2]
      std: [0.3, 0.5, 0.7]

  # ASY (6)
  - id: ASY-001
    params: {}
  - id: ASY-002
    params: {}
  - id: ASY-003
    params: {}
  - id: ASY-004
    params:
      gradient: [0.1, 0.3, 0.5]
      noise: [0.1, 0.3, 0.5]
  - id: ASY-005
    params: {}
  - id: ASY-006
    params:
      density: [0.1, 0.2, 0.4]

  # RN (4) – chaque avec rank 2 et 3
  - id: RN-001
    params:
      rank: [2, 3]
  - id: RN-002
    params:
      rank: [2, 3]
  - id: RN-003
    params:
      rank: [2, 3]
  - id: RN-004
    params:
      rank: [2, 3]

  # R3 conservés (2)
  - id: R3-003
    params:
      radius: [1, 2, 3]
  - id: R3-007
    params:
      n_blocks: [3, 4, 5]
      intra: [0.6, 0.7, 0.8]
      inter: [0.05, 0.1, 0.15]

# ---------------------------------------------------------------------------
# MODIFIERS (3)
# ---------------------------------------------------------------------------
modifier:
  - id: M0
    params: {}
  - id: M1
    params:
      sigma: [0.01, 0.05, 0.1]
  - id: M2
    params:
      amplitude: [0.05, 0.1, 0.2]
