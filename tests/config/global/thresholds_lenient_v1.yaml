version: "1.0"
config_id: "thresholds_lenient_v1"
description: "Seuils verdicts R0 - configuration permissive (exploration large)"
created_date: "2025-01-02"
charter_reference: "Section 12.9"

# Seuil test individuel (plus permissif)
threshold_test: 0.80  # vs 0.70 default

# Seuils SURVIVES (plus facile à atteindre)
