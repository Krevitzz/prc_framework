# =============================================================================
# TEMPLATE RUN PRC v7 — BOURRIN
# Tout actif — 2 variations par paramètre.
# Objectif : vérifier gestion RAM + absence recompilation XLA sur large config.
#
# seed_CI : niveau racine (clé encoding, générée une fois avant scan)
# seed_run : niveau racine (clé gamma stochastique, par run)
# params encoding/gamma : variations scalaires → vmap, zéro recompilation
#
# Encodings R3-001..006 numpy supprimés → RN-* avec params rank.
# GAM-011 requiert prepare_params (W pré-calculée).
# GAM-014 requiert prepare_params (U orthogonale pré-calculée).
# GAM-002, 007, 012, 013 : rank_constraint=2 → ignorés si rank_eff ≥ 3
#   (filtrage automatique dans generate_groups).
# =============================================================================

phase: bourrin_v7
config_mode: default
dmd_rank: 16    # Rang DMD streaming — statique XLA (wiper jax_cache/ si modifié)

# ---------------------------------------------------------------------------
# Axes structurels — chaque combinaison = un groupe XLA distinct
# (shapes différentes → recompilation inévitable, correctement anticipée)
#
#   n_dof         : dimension du tenseur → shape (n_dof,) * rank_eff
#   max_iterations: longueur du lax.scan → graphe XLA différent
#   rank_eff      : dérivé de encoding.params.rank pour RN-* (rank=None dans METADATA)
#                   SYM-*/ASY-* → rank_eff=2 fixe
#                   RN-001 rank=2 → group_key(.., rank_eff=2, ..)
#                   RN-001 rank=3 → group_key(.., rank_eff=3, ..)  ← groupe séparé
#                   R3-003/R3-007 → rank_eff=3 fixe
#
# Axes scalaires (vmap, zéro recompilation dans un groupe) :
#   seed_CI  : PRNGKey encoding — généré une fois avant lax.scan
#   seed_run : PRNGKey gamma stochastique — varié par run
#   params   : beta, sigma, scale, ... — scalaires vmappés
# ---------------------------------------------------------------------------

n_dof: [10, 50]
max_iterations: [50, 200]

# rank_eff est implicite : défini par encoding.params.rank pour RN-*
# Chaque valeur de rank dans RN-* params génère un groupe XLA distinct.
# Ici rank=[2,3] → 2 groupes par combinaison (gamma, mod, n_dof, max_it)

seed_CI: [0, 1,2]
seed_run: [null, 0,1]

# ---------------------------------------------------------------------------
# AXES ATOMICS
# ---------------------------------------------------------------------------

axes:

  # --------------------------------------------------------------------------
  # GAMMAS
  # --------------------------------------------------------------------------

  gamma:

    # -- Markovians -----------------------------------------------------------

    - id: GAM-001
      params:
        beta: [1.0, 5.0]

    - id: GAM-002           # rank_constraint=2 — skippé si rank_eff≥3
      params:
        alpha: [0.05, 0.15]

    - id: GAM-003           # explosion — NaN attendus sur max_it élevé
      params:
        gamma: [0.03, 0.08]

    - id: GAM-004
      params:
        gamma: [0.03, 0.08]

    - id: GAM-011           # prepare_params → W pré-calculée
      params:
        scale: [0.8, 1.2]

    - id: GAM-014           # rank_constraint=2, prepare_params → U orthogonale
      params: {}

    - id: GAM-015           # SVD truncation — differentiable=False
      params:
        k: [3, 5]

    # -- Non-markovians (fallback markovien actif) ----------------------------

    - id: GAM-005
      params:
        omega: [0.785, 1.571]       # π/4, π/2

    - id: GAM-006
      params:
        beta: [1.0, 2.0]
        alpha: [0.3, 0.7]

    - id: GAM-007           # rank_constraint=2
      params:
        epsilon: [0.1, 0.4]

    - id: GAM-008
      params:
        gamma: [0.3, 0.7]
        beta: [1.0, 3.0]

    # -- Stochastiques --------------------------------------------------------

    - id: GAM-009
      params:
        beta: [1.0, 2.0]
        sigma: [0.01, 0.1]

    - id: GAM-010
      params:
        sigma: [0.01, 0.1]

    # -- Structuraux ----------------------------------------------------------

    - id: GAM-012           # rank_constraint=2
      params:
        beta: [1.0, 3.0]

    - id: GAM-013           # rank_constraint=square
      params:
        eta: [0.005, 0.05]

  # --------------------------------------------------------------------------
  # ENCODINGS
  # --------------------------------------------------------------------------

  encoding:

    # -- Symétrique rang 2 ----------------------------------------------------

    - id: SYM-001           # déterministe (seed_CI ignorée)

    - id: SYM-002           # U[-1,1] symétrisée

    - id: SYM-003
      params:
        sigma: [0.3, 0.7]

    - id: SYM-004           # matrice corrélation

    - id: SYM-005
      params:
        bandwidth: [2, 5]
        amplitude: [0.3, 0.7]

    - id: SYM-006
      params:
        n_blocks: [4, 10]
        intra: [0.5, 0.8]
        inter: [0.05, 0.15]

    - id: SYM-007           # déterministe
      params:
        correlation: [0.3, 0.7]

    - id: SYM-008
      params:
        mean: [0.0, 0.2]
        std: [0.3, 0.7]

    # -- Asymétrique rang 2 ---------------------------------------------------

    - id: ASY-001

    - id: ASY-002

    - id: ASY-003           # antisymétrique

    - id: ASY-004
      params:
        gradient: [0.1, 0.5]
        noise: [0.1, 0.5]

    - id: ASY-005           # circulante, déterministe

    - id: ASY-006
      params:
        density: [0.1, 0.4]

    # -- Rang paramétrique (RN-*) — remplace R3-001,002,004,005,006 ----------
    # rank devient axe de variation → groupes XLA distincts par rank

    - id: RN-001
      params:
        rank: [2, 3]        # rank=2 → shape (n_dof,n_dof) ; rank=3 → (n_dof,n_dof,n_dof)

    - id: RN-002
      params:
        rank: [2, 3]

    - id: RN-003
      params:
        rank: [2, 3]        # déterministe

    - id: RN-004
      params:
        rank: [2, 3]

    # -- Rang 3 structures spécifiques ----------------------------------------

    - id: R3-003
      params:
        radius: [1, 3]

    - id: R3-007
      params:
        n_blocks: [3, 6]

  # --------------------------------------------------------------------------
  # MODIFIERS
  # --------------------------------------------------------------------------

  modifier:

    - id: M0

    - id: M1
      params:
        sigma: [0.01, 0.1]

    - id: M2
      params:
        amplitude: [0.05, 0.2]
