# tests/config/global/scoring_strict_v1.yaml
# Variante stricte (seuils plus exigeants)

version: "1.0"
config_id: "scoring_strict_v1"
description: "Scoring strict - seuils exigeants pour sélection rigoureuse"
created_date: "2025-01-03"

default_aggregation_mode: "max"

tests:
  UNIV-001:
    test_weight: 2.0
    aggregation_mode: "max"
    
    scoring_rules:
      frobenius_norm:
        source: "statistics.frobenius_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 500.0       # vs 1000.0 (÷2)
        critical_high: 5000.0       # vs 10000.0 (÷2)
        weight: 2.0
        mode: "soft"
      
      stat_std:
        source: "statistics.frobenius_norm.std"
        pathology_type: "S1_COLLAPSE"
        threshold_low: 0.5          # vs 0.1 (×5)
        critical_low: 0.05          # vs 0.01 (×5)
        weight: 1.5
        mode: "soft"
      
      evolution_transition:
        source: "evolution.frobenius_norm.transition"
        pathology_type: "MAPPING"
        mapping:
          explosive: 1.0
          divergent: 1.0
          stable: 0.0
          converged: 0.0
          growing: 0.5              # vs 0.3 (plus sévère)
          shrinking: 0.5
          oscillating: 0.6          # vs 0.4
        weight: 3.0

  SYM-001:
    test_weight: 1.5
    aggregation_mode: "max"
    
    scoring_rules:
      asymmetry_norm:
        source: "statistics.asymmetry_norm.final"
        pathology_type: "S2_EXPLOSION"
        threshold_high: 0.01        # vs 0.1 (÷10)
        critical_high: 0.1          # vs 1.0 (÷10)
        weight: 3.0
        mode: "soft"