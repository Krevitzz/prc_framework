# clustering_peeling.yaml
# Configuration du residual peeling HDBSCAN
# Intégration : analysing/configs/clustering_peeling.yaml

peeling:

  # ── Paramètres globaux ──────────────────────────────────────────────────────

  max_levels: 4                  # Profondeur maximale de peeling

  mcs_floor: 8                   # min_cluster_size absolu (jamais en dessous)
  ms_floor:  3                   # min_samples absolu

  # Arrêt anticipé si le résidu ne diminue plus
  min_delta_extracted: 1         # Minimum de points extraits par niveau pour continuer

  # ── Niveau 0 — config primaire ──────────────────────────────────────────────
  level_0:
    metric:    cosine            # Métrique principale (meilleure en audit)
    selection: eom
    pca_dims:  null              # null = espace complet

  # ── Niveaux 1..N — batterie de configs sur le résidu ───────────────────────
  residual_configs:
    - {metric: euclidean, selection: eom,  pca_dims: null}
    - {metric: cosine,    selection: leaf, pca_dims: null}
    - {metric: manhattan, selection: eom,  pca_dims: null}
    - {metric: cosine,    selection: eom,  pca_dims: 5}
    - {metric: cosine,    selection: eom,  pca_dims: 10}
    - {metric: euclidean, selection: eom,  pca_dims: 5}

  # Sélection de la config à appliquer sur le résidu :
  # best_zones    → maximise zone_purity (nécessite zones visuelles)
  # best_clusters → maximise n_clusters stables (ARI > ari_min)
  # best_score    → score composite (défaut, robuste sans zones)
  residual_selection: best_score

  ari_min: 0.80                  # ARI bootstrap minimum pour qu'une config soit retenue

  # ── mcs adaptatif sur le résidu ─────────────────────────────────────────────
  mcs_adaptive:
    enabled: true
    # mcs_résidu = max(mcs_floor, int(mcs_global * sqrt(n_résidu/n_total) / density_factor))
    # density_factor = (densité résidu / densité globale), capé entre 0.3 et 3.0
    density_factor_min: 0.3
    density_factor_max: 3.0

  # ── Homogénéité — critère d'extraction ─────────────────────────────────────
  homogeneity:
    # Score composite : mean_probability × weight_proba
    #                 + silhouette_cluster × weight_silh
    #                 (+ regime_purity × weight_regime si régimes disponibles)
    weight_probability: 0.5
    weight_silhouette:  0.3
    weight_regime:      0.2      # Ignoré si régimes absents (poids redistribué)

    # Seuil de base au niveau 0
    threshold_base: 0.65

    # Incrément par niveau (fixe = 0.0, progressif = ex 0.05)
    threshold_step: 0.05

    # Plafond absolu (jamais atteint si step=0)
    threshold_max:  0.90

    # Silhouette minimum pour qu'un cluster soit éligible à l'extraction
    # (indépendant du score composite)
    silhouette_min: -0.10        # Très permissif — le composite filtre

  # ── Bootstrap stabilité ─────────────────────────────────────────────────────
  bootstrap:
    enabled:    true
    n_iter:     5
    subsample:  0.80

  # ── Silhouette ───────────────────────────────────────────────────────────────
  silhouette:
    max_samples: 500             # Sous-échantillonnage pour scalabilité

  # ── Sortie ───────────────────────────────────────────────────────────────────
  output:
    save_trace:     true         # Trace JSON par niveau (quel cluster extrait où)
    save_labels:    true         # Vecteur labels final (.npy)
    plot_levels:    true         # Visualisation t-SNE par niveau
    plot_summary:   true         # Heatmap synthèse finale
