# tests/config/global/verdict_default_v1.yaml
version: "1.0"
config_id: "verdict_default_v1"
description: "Patterns detection R0 - default"

normalization:
  default_method: "robust"
  scope: "per_test"
  outlier_threshold: 3.0
  per_pattern: {}

patterns:
  non_discriminant:
    method: "robust"
    normalized_threshold: -2.0
    min_observations: 10
  
  over_discriminant:
    method: "robust"
    normalized_threshold: 2.0
    min_observations: 10
  
  d_correlated:
    variance_threshold: 0.3
    min_d_groups: 2
  
  modifier_correlated:
    variance_threshold: 0.3
    min_modifier_groups: 2
  
  seed_unstable:
    variance_threshold: 0.3
    min_seeds: 3
  
  systematic_anomaly:
    normalized_threshold: 2.0
    ratio_threshold: 0.8
    min_observations: 10

verdict_rules:
  REJECTED:
    required_patterns: ["systematic_anomaly"]
    min_tests_affected: 2
  
  WIP:
    required_patterns: 
      - "d_correlated"
      - "modifier_correlated"
      - "seed_unstable"
    min_patterns: 1
  
  SURVIVES:
    max_patterns_detected: 1