# analysing/configs/analysing_default.yaml
# Config analysing PRC v7 — hdbscan + scope + orthogonalization

hdbscan:
  min_cluster_size: 50
  min_samples: 10
  max_samples: 5000   # cap silhouette O(n²)
  bootstrap_ari:
    n_iter: 0         # 0 = off par défaut (coûteux)

scope:
  # Filtres appliqués AVANT clustering — pushdown pyarrow si possible
  run_status: [OK, EXPLOSION]   # NAN_ALL / INVALID / FAIL exclus
  seeds: all                    # all | one (un seed par gamma×encoding)
  n_dof: all                    # all | [10] | [50] | [10, 50]
  rank_eff: all                 # all | [2] | [3]
  modifiers: all                # all | [M0]

orthogonalization:
  max_features: 20
  correlation_threshold: 0.85

pool_requirements:
  apply: false                  # true = filtre deprecated/n_dof depuis configs/pool_requirements.yaml

peeling:
  homogeneity:
    threshold_base: 0.55
    threshold_step: 0.05
    threshold_max:  0.80
    weight_probability: 0.5
    weight_silhouette:  0.3
    weight_regime:      0.2
  mcs_floor: 8
  ms_floor:  3
  max_levels: 6
  min_delta_extracted: 1
  residual_selection: best_score
  mcs_adaptive:
    enabled: true
    density_factor_min: 0.5
    density_factor_max: 2.0
  bootstrap:
    enabled: false
    n_iter:  5
    subsample: 0.8
  silhouette:
    max_samples: 2000
  level_0:
    metric:    cosine
    selection: eom
    pca_dims:  null
  residual_configs:
    - metric: cosine
      selection: eom
      pca_dims: null
    - metric: euclidean
      selection: leaf
      pca_dims: 20
    - metric: cosine
      selection: leaf
      pca_dims: null

outliers:
  contamination: 0.10     # Fraction attendue outliers (IsolationForest)

projection:
  umap_threshold: 50000   # n ≥ seuil → UMAP si disponible, sinon t-SNE
