# featuring/configs/minimal/matrix_square.yaml
# Layer matrice carrée — rank 2 ET is_square
# Hérite implicitement de matrix_2d (toute run matrix_square est aussi matrix_2d)

applicability:
  - {field: rank,      op: "=", value: 2}
  - {field: is_square, op: "=", value: true}

functions:
  - name: trace
    projections: [initial, final]
    params: {}

  - name: eigenvalue_max
    projections: [initial, final]
    params: {}

  - name: asymmetry_norm
    projections: [final]
    params: {}

  - name: condition_number
    projections: [final]
    params: {}

  - name: determinant
    projections: [final]
    params: {}

  - name: symmetry_deviation
    projections: [final]
    params: {}