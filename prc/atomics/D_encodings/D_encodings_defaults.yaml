# configs/atomics/D_encodings/defaults.yaml
#
# Valeurs par défaut des paramètres encodings.
# Chargé si aucune surcharge dans le YAML de run.
#
# Pour surcharger dans un YAML de run :
#   params:
#     SYM-003:
#       sigma: 0.5
#     ASY-004:
#       gradient: 0.3
#       noise_amplitude: 0.1

# --- Rang 2 Symétrique ---
SYM-001: {}             # Identité — aucun paramètre
SYM-002: {}             # Aléatoire uniforme — aucun paramètre
SYM-003:
  sigma: 0.3
SYM-004: {}             # Matrice de corrélation — aucun paramètre
SYM-005:
  bandwidth: 3
  amplitude: 0.5
SYM-006:
  n_blocks: 10
  intra_corr: 0.7
  inter_corr: 0.1
SYM-007:
  correlation: 0.5
SYM-008:
  mean: 0.0
  std: 0.3

# --- Rang 2 Asymétrique ---
ASY-001: {}             # Aléatoire asymétrique — aucun paramètre
ASY-002: {}             # Triangulaire inférieure — aucun paramètre
ASY-003: {}             # Antisymétrique — aucun paramètre
ASY-004:
  gradient: 0.1
  noise_amplitude: 0.2
ASY-005: {}             # Circulant — aucun paramètre
ASY-006:
  density: 0.2

# --- Rang 3 ---
R3-001: {}              # Aléatoire uniforme — aucun paramètre
R3-002: {}              # Symétrique partiel — aucun paramètre
R3-003:
  radius: 2
R3-004: {}              # Symétrique total — aucun paramètre
R3-005: {}              # Diagonal — aucun paramètre
R3-006: {}              # Séparable — aucun paramètre
R3-007:
  n_blocks: 4
